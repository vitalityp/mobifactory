<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Embed Factory | Free Embeddable Tools</title>
    <meta name="description" content="Free viral micro tools you can embed on your own site. AI Roast, Hacker Name, Fake Chat, and more.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f0f; color: #f1f5f9; font-family: system-ui, sans-serif; }
        .card-hover:active { background: #1e1e1e; border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 max-w-2xl mx-auto">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">🧠 Embed Factory</h1>
        <p class="text-zinc-400 text-sm mt-2">Free tools. Embed anywhere. Backlinks automatic.</p>
    </div>

    <div class="space-y-4">
        <div class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 hover:bg-zinc-800 transition">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🔥</span>
                    <div>
                        <h2 class="font-bold text-white text-lg">AI Roast My Bio</h2>
                        <p class="text-xs text-zinc-500">Let AI destroy your Instagram bio</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <a href="/tools/roast-bio.html" class="bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-semibold">Open</a>
                    <button onclick="copyEmbed('roast-bio')" class="bg-zinc-700 text-zinc-300 px-4 py-2 rounded-full text-xs font-semibold">&lt;/&gt; Embed</button>
                </div>
            </div>
            <div id="embed-roast-bio" class="mt-3 hidden">
                <textarea readonly class="w-full h-16 p-2 bg-black border border-zinc-700 rounded-lg text-xs text-green-400 font-mono" id="code-roast-bio">
&lt;iframe src="https://mobifactory.pages.dev/tools/roast-bio.html" width="100%" height="400" frameborder="0"&gt;&lt;/iframe&gt;</textarea>
                <button onclick="copyCode('roast-bio')" class="mt-2 bg-green-700 text-white px-4 py-1 rounded-lg text-xs">📋 Copy Code</button>
            </div>
        </div>
    </div>

    <p class="text-zinc-600 text-xs text-center mt-8">☕ <a href="https://buymeacoffee.com/YOUR_USERNAME" class="underline hover:text-white">Support us</a> — Embed these tools free on your site.</p>

    <script>
        function copyEmbed(toolName) {
            const embedDiv = document.getElementById('embed-' + toolName);
            embedDiv.classList.toggle('hidden');
        }
        function copyCode(toolName) {
            const code = document.getElementById('code-' + toolName);
            code.select();
            code.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(code.value);
            alert('Embed code copied! Paste it on your site.');
        }
    </script>
</body>
</html>
