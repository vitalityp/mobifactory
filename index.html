<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Embed Factory | Free Embeddable Tools</title>
    <meta name="description" content="Free viral micro tools you can embed on your own site.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f0f; color: #f1f5f9; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="p-4 max-w-2xl mx-auto">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">🧠 Embed Factory</h1>
        <p class="text-zinc-400 text-sm mt-2">Free tools. Embed anywhere. Backlinks automatic.</p>
    </div>

    <!-- یہاں کارڈز خود بخود بھر جائیں گے -->
    <div id="toolsContainer" class="space-y-4">
        <p class="text-center text-zinc-500">Loading tools...</p>
    </div>

    <p class="text-zinc-600 text-xs text-center mt-8">
        ☕ Support us | 
        <a href="/offer.html" class="underline hover:text-white">Need a custom tool?</a> — Embed these tools free on your site.
    </p>

    <script>
        async function loadTools() {
            const container = document.getElementById('toolsContainer');
            try {
                const response = await fetch('/tools.json');
                if (!response.ok) throw new Error('File not found');
                const tools = await response.json();
                container.innerHTML = '';
                tools.forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'p-4 bg-zinc-900 rounded-2xl border border-zinc-800 hover:bg-zinc-800 transition';
                    card.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-3xl">${tool.icon}</span>
                                <div>
                                    <h2 class="font-bold text-white text-lg">${tool.name}</h2>
                                    <p class="text-xs text-zinc-500">${tool.description}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <a href="${tool.file}" class="bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-semibold">Open</a>
                                <button class="embed-btn bg-zinc-700 text-zinc-300 px-4 py-2 rounded-full text-xs font-semibold" data-embed-id="${tool.embedId}">&lt;/&gt; Embed</button>
                            </div>
                        </div>
                        <div id="embed-${tool.embedId}" class="mt-3 hidden">
                            <textarea readonly class="w-full h-16 p-2 bg-black border border-zinc-700 rounded-lg text-xs text-green-400 font-mono" id="code-${tool.embedId}">&lt;iframe src="https://mobifactory.pages.dev${tool.file}" width="100%" height="400" frameborder="0"&gt;&lt;/iframe&gt;</textarea>
                            <button class="copy-btn mt-2 bg-green-700 text-white px-4 py-1 rounded-lg text-xs" data-embed-id="${tool.embedId}">📋 Copy Code</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
                attachEvents();
            } catch (error) {
                container.innerHTML = '<p class="text-center text-red-400">⚠️ Unable to load tools. Please try again later.</p>';
            }
        }

        function attachEvents() {
            document.querySelectorAll('.embed-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const embedId = this.getAttribute('data-embed-id');
                    const div = document.getElementById('embed-' + embedId);
                    if (div) div.classList.toggle('hidden');
                });
            });
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const embedId = this.getAttribute('data-embed-id');
                    const codeArea = document.getElementById('code-' + embedId);
                    if (codeArea) {
                        codeArea.select();
                        codeArea.setSelectionRange(0, 99999);
                        navigator.clipboard.writeText(codeArea.value).then(() => {
                            alert('Embed code copied! Paste it on your site.');
                        }).catch(() => {
                            alert('Failed to copy. Please manually copy the code.');
                        });
                    }
                });
            });
        }

        window.addEventListener('DOMContentLoaded', loadTools);
    </script>
</body>
</html>
